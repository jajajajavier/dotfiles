# Alacritty config por javier
# https://github.com/jajajajavier
#
# Para cambiar un tema, borrar colors con su interior y 
# remplasarlo por el contenido de un archivo de la carpeta themes 
#
# P.D: Cualquier cambio fijarse bien en los espacios ;)


# >>>>>>>>>>>>>>>Opacidad<<<<<<<<<<<<<<<

background_opacity: 0.92


# >>>>>>>>>>>>>>>Colores<<<<<<<<<<<<<<<



# Iterm Theme

colors:
  # Default colors
  primary:
    background: '#101421'
    foreground: '#fffbf6'

 # Normal colors
  normal:
    black:   '#2e2e2e'
    red:     '#eb4129'
    green:   '#abe047'
    yellow:  '#f6c744'
    blue:    '#47a0f3'
    magenta: '#7b5cb0'
    cyan:    '#64dbed'
    white:   '#e5e9f0'

 # Bright colors
  bright:
    black:   '#565656'
    red:     '#ec5357'
    green:   '#c0e17d'
    yellow:  '#f9da6a'
    blue:    '#49a4f8'
    magenta: '#a47de9'
    cyan:    '#99faf2'
    white:   '#ffffff'


# >>>>>>>>>>>>>>>Fuentes<<<<<<<<<<<<<<< 
# Para cambiar fuentes solo descomentar una opcion y 
# comentar la otra 
# 
# Paquetes AUR para las fuentes:
# nerd-fonts
# nerd-fonts-ubuntu-mono
# nerd-fonts-mononoki
# nerd-fonts-cascadia-code
# nerd-fonts-hermit

font:
  
  bold:
    # family: UbuntuMono Nerd Font
    # family: mononoki Nerd Font
    family: Caskaydia Cove Nerd Font
    # family: Hurmit Nerd Font

  italic:
    # family: UbuntuMono Nerd Font
    # family: mononoki Nerd Font
    family: Caskaydia Cove Nerd Font
    # family: Hurmit Nerd Font
 
  normal:
    # family: UbuntuMono Nerd Font
    # family: mononoki Nerd Font
    family: Caskaydia Cove Nerd Font
    # family: Hurmit Nerd Font

    style: Regular
  
 # Tamaño de letra 
  size: 6

# >>>>>>>>>>>>>>>Otros<<<<<<<<<<<<<<<

cursor:
  
  # Estilo del cursor 
  style:
    shape: Beam
    # Valores para shape:
    #   Block       ▇ 
    #   Underline   _
    #   Beam        |


# Distancia del borde la terminal y el texto 
window:
  padding:
    x: 3
    y: 2
