# Alacritty config 
# by javier
# https://github.com/jajajajavier


# >>>>>>>>>>>>>>>Opacity<<<<<<<<<<<<<<<
background_opacity: 0.92


# >>>>>>>>>>>>>>>Colors<<<<<<<<<<<<<<<

colors:
  # Default colors
  primary:
    background: '#101421'
    foreground: '#fffbf6'

 # Normal colors
  normal:
    black:   '#2e2e2e'
    red:     '#eb4129'
    green:   '#abe047'
    yellow:  '#f6c744'
    blue:    '#47a0f3'
    magenta: '#7b5cb0'
    cyan:    '#64dbed'
    white:   '#e5e9f0'

 # Bright colors
  bright:
    black:   '#565656'
    red:     '#ec5357'
    green:   '#c0e17d'
    yellow:  '#f9da6a'
    blue:    '#49a4f8'
    magenta: '#a47de9'
    cyan:    '#99faf2'
    white:   '#ffffff'


# >>>>>>>>>>>>>>>Fonts<<<<<<<<<<<<<<< 
#
# You need the following fonts
# installation with AUR helper:
# 
# nerd-fonts
# nerd-fonts-ubuntu-mono
# nerd-fonts-mononoki
# nerd-fonts-cascadia-code
# nerd-fonts-hermit
# nerd-fonts-inconsolata
# nerd-fonts-hack

font:
  
  bold:
    # family: UbuntuMono Nerd Font
    # family: mononoki Nerd Font
    # family: Caskaydia Cove Nerd Font
    # family: Hurmit Nerd Font
    # family: Inconsolata Nerd Font
    family: Hack Nerd Font

  italic:
    # family: UbuntuMono Nerd Font
    # family: mononoki Nerd Font
    # family: Caskaydia Cove Nerd Font
    # family: Hurmit Nerd Font
    # family: Inconsolata Nerd Font
    family: Hack Nerd Font

  normal:
    # family: UbuntuMono Nerd Font
    # family: mononoki Nerd Font
    # family: Caskaydia Cove Nerd Font
    # family: Hurmit Nerd Font
    # family: Inconsolata Nerd Font
    family: Hack Nerd Font
   
    style: Regular
  
  # letter size
  size: 6

# >>>>>>>>>>>>>>>Others<<<<<<<<<<<<<<<

cursor:
  
  # Cursor style
  style:
    shape: Beam
    # Values for shape:
    #   Block       ▇ 
    #   Underline   _
    #   Beam        |


# Padding 
window:
  padding:
    x: 3
    y: 2
