# Neofetch config
#
# by javier
# https://github.com/jajajajavier
#
# See this wiki page for more info:
# https://github.com/dylanaraps/neofetch/wiki/Customizing-Info

print_info() {
    
    info title
    info underline # ······························
    info " " distro   
    info " " kernel    
    info " " model   
    info underline # ······························
    info " " cpu
    info "礪" gpu
    info " " memory   
    info " " disk  
    info underline # ·····························
    info " " packages
    info " " local_ip
    info "ﲵ " shell
    info " " resolution
    info " " term
    info " " de 
    info cols
}

# Settings

# Text config---------
colors=(4 6 1 5 2 7)
bold="off"
underline_enabled="on"
underline_char="·"
separator="»"


title_fqdn="off" # show complete domain name
# ······························
kernel_shorthand="on"
distro_shorthand="off"
os_arch="on"
# ······························
# CPU
speed_type="bios_limit"
speed_shorthand="on"
cpu_brand="on"
cpu_cores="physical"
cpu_speed="on"
cpu_temp="off"	# values: 'C', 'F', 'off'
# GPU
pu_brand="on"
gpu_type="all"	# Values:  'all', 'dedicated', 'integrated'
# RAM
memory_percent="off"
memory_unit="gib"	# values: 'gib'. 'mib', 'kib'
# Disk
disk_show=('/') # Values:  '/', '/dev/sdXX', '/path/to/drive'.
disk_subtitle="none"
disk_percent="off"
# ······························
package_managers="tiny"	# values: 'on', 'off', 'tiny'
shell_path="off"
shell_version="on"
gtk_shorthand="off"
refresh_rate="on"
# Color Blocks
block_range=(0 7)
color_blocks="on"
block_width=5
block_height=1


# ASCII settings-------
image_backend="ascii"
image_source="ascii"
ascii_colors=(distro) 
ascii_bold="on"

ascii_distro="auto" # values: 'auto', 'distro_name'
